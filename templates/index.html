<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chess Next-Move Calculator</title>

    <!-- Chessboard UI -->
    <link rel="stylesheet"
          href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <!-- jQuery (required by chessboardjs) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Chess logic (validates moves) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>

    <!-- Chessboard UI -->
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            min-height: 100vh;
        }
        h1 { font-size: 1.8rem; margin-bottom: 8px; color: #e2b96f; }
        p.subtitle { color: #aaa; margin-bottom: 24px; font-size: 0.95rem; }
        #board-container { width: 420px; max-width: 100%; }
        #board { width: 100%; }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        #calcBtn { background: #e2b96f; color: #1a1a2e; }
        #resetBtn { background: #444; color: #eee; }
        #flipBtn  { background: #444; color: #eee; }
        #result {
            margin-top: 20px;
            background: #16213e;
            border-radius: 8px;
            padding: 16px 24px;
            min-width: 300px;
            text-align: center;
            font-size: 1rem;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #result .move  { font-size: 1.4rem; font-weight: bold; color: #e2b96f; }
        #result .score { color: #aaa; font-size: 0.9rem; margin-top: 4px; }
        #result.error  { color: #ff6b6b; }
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid #444;
            border-top-color: #e2b96f;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<h1>♟ Chess Next-Move Calculator</h1>
<p class="subtitle">Drag pieces to set up any position, then calculate the best move</p>

<div id="board-container">
    <div id="board"></div>
</div>

<div class="controls">
    <button id="calcBtn" onclick="getBestMove()">⚡ Calculate Best Move</button>
    <button id="flipBtn"  onclick="board.flip()">🔄 Flip Board</button>
    <button id="resetBtn" onclick="resetBoard()">↩ Reset</button>
</div>

<div id="result">Make a move or click Calculate</div>

<script>
    const game = new Chess();

    function onDrop(source, target) {
        const move = game.move({ from: source, to: target, promotion: 'q' });
        if (move === null) return 'snapback';
        // Clear result when user moves
        document.getElementById('result').className = '';
        document.getElementById('result').innerHTML = 'Click Calculate Best Move';
    }

    function onSnapEnd() {
        board.position(game.fen());
    }

    const board = Chessboard('board', {
        draggable: true,
        position: 'start',
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
    });

    function resetBoard() {
        game.reset();
        board.start();
        document.getElementById('result').className = '';
        document.getElementById('result').innerHTML = 'Make a move or click Calculate';
    }

    function getBestMove() {
        const fen = game.fen();
        const resultDiv = document.getElementById('result');

        resultDiv.className = '';
        resultDiv.innerHTML = '<div class="spinner"></div>';

        fetch('/best_move', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fen: fen })
        })
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = '⚠ ' + data.error;
                return;
            }

            // Show the best move on the board
            const from = data.move.slice(0, 2);
            const to   = data.move.slice(2, 4);
            game.move({ from, to, promotion: 'q' });
            board.position(game.fen());

            resultDiv.innerHTML = `
                <div>
                    <div class="move">Best move: ${data.move}</div>
                    <div class="score">Evaluation: ${data.score} (+ favours White)</div>
                </div>`;
        })
        .catch(() => {
            resultDiv.className = 'error';
            resultDiv.innerHTML = '⚠ Could not connect to server.';
        });
    }
</script>

</body>
</html>
